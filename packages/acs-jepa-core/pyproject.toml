[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "acs-jepa-core"
version = "0.1.0"
description = "autonomous control system jepa"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "torch>=2.11.0",
    "torch-geometric>=2.7.0",
    "unified-planning>=1.3.0",
]

[dependency-groups]
dev = [
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

# test configuration
[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --import-mode=importlib"
pythonpath = [
    "src"
]
testpaths = [
    "tests"
]
